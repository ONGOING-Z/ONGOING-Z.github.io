<!doctype html><html lang=zh-cn><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>做饭：素炒毛豆 | ongoing's blog</title><link rel=stylesheet href=/css/style.css><link rel=stylesheet href=/css/fonts.css></head><body><nav><ul class=menu><li><a href=/>首页</a></li><li><a href=/categories/>分类</a></li><li><a href=/about/>关于</a></li></ul><hr></nav><div class=article-meta><h1><span class=title>做饭：素炒毛豆</span></h1><h2 class=date>2025/06/16</h2></div><main><p>今晚的晚饭是素炒毛豆，这里记录一下。</p><h3 id=一食材>一、食材</h3><table><thead><tr><th>序号</th><th>食材</th></tr></thead><tbody><tr><td>1</td><td>油</td></tr><tr><td>2</td><td>盐</td></tr><tr><td>3</td><td>毛豆（买的就是剥好的）</td></tr><tr><td>4</td><td>青椒*4</td></tr><tr><td>5</td><td>小米辣*4</td></tr><tr><td>6</td><td>鸡蛋*2</td></tr><tr><td>7</td><td>米饭（电饭煲煮好）</td></tr></tbody></table><h3 id=二做饭步骤>二、做饭步骤</h3><table><thead><tr><th>步骤</th><th>描述</th></tr></thead><tbody><tr><td>1</td><td>起锅烧油</td></tr><tr><td>2</td><td>先煎两个鸡蛋，鸡蛋煎好盛出</td></tr><tr><td>3</td><td>倒油</td></tr><tr><td>4</td><td>放入洗好的毛豆</td></tr><tr><td>5</td><td>炒毛豆</td></tr><tr><td>6</td><td>放入盐</td></tr><tr><td>7</td><td>加入水，刚好漫过毛豆</td></tr><tr><td>8</td><td>放入青椒、红色小米辣</td></tr><tr><td>9</td><td>放入前面炒好的煎蛋</td></tr><tr><td>10</td><td>把水分炒干</td></tr><tr><td>11</td><td>完毕</td></tr></tbody></table></main><script>document.addEventListener("DOMContentLoaded",function(){const e=new PhotoSwipeLightbox({gallery:".pswp-gallery",children:"a",pswpModule:PhotoSwipe});e.init()})</script>
