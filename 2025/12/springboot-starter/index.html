<!doctype html><html lang=zh-cn><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Springboot starter 的初始化时机 | ongoing's blog</title><link rel=stylesheet href=/css/style.css><link rel=stylesheet href=/css/fonts.css></head><body><nav><ul class=menu><li><a href=/>首页</a></li><li><a href=/categories/>分类</a></li><li><a href=/about/>关于</a></li></ul><hr></nav><div class=article-meta><h1><span class=title>Springboot starter 的初始化时机</span></h1><h2 class=date>2025/12/12</h2></div><main><p>前提：你定义的一个自己的场景启动器（starter），这里来一个简单的示例，</p><img src=my_starter.png alt><p>这里项目的 spring.factories 文件中定义了一个键值对，键就是熟悉的注解@EnableAutoConfiguration，值是业务定义的配置类。</p><img src=configuration_class.png alt><p>这个配置类只是简单地声明了一个业务类。</p><p>这就是一个简单的 starter 项目。</p><p>好了，进入正题，来看下这个自动配置类是如何被加载的，流程是怎样的。</p><figure class=pswp-gallery style=display:inline-block;margin:0><a href=/2025/12/springboot-starter/spring_process-load_starter.svg data-pswp-width=800 data-pswp-height=600 target=_blank><img src=/2025/12/springboot-starter/spring_process-load_starter.svg alt style=max-width:100%;height:auto></a></figure></main><script>document.addEventListener("DOMContentLoaded",function(){const e=new PhotoSwipeLightbox({gallery:".pswp-gallery",children:"a",pswpModule:PhotoSwipe});e.init()})</script>
